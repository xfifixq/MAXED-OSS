x-maxed-runtime-base: &maxed-runtime-base
  build:
    context: ../platform
  restart: unless-stopped
  env_file:
    - ../platform/.env
  environment:
    MAXED_GATEWAY_PORT: 4100
    MAXED_AUTH_PORT: 4101
    MAXED_API_PORT: 4102
    MAXED_EXTERNAL_API_PORT: 4103
    MAXED_STREAM_PORT: 4104
    MAXED_CONFIG_PORT: 4105
    MAXED_GATEWAY_INTERNAL_URL: http://maxed-gateway:4100
    MAXED_AUTH_INTERNAL_URL: http://maxed-auth:4101
    MAXED_API_INTERNAL_URL: http://maxed-api:4102
    MAXED_EXTERNAL_API_INTERNAL_URL: http://maxed-external-api:4103
    MAXED_STREAM_INTERNAL_URL: http://maxed-stream:4104
    MAXED_CONFIG_INTERNAL_URL: http://maxed-config:4105
    PUBLIC_API_URL: https://api.maxed.life
  volumes:
    - maxed_storage:/app/storage
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ============================================
  # SHARED INFRASTRUCTURE
  # ============================================

  postgres:
    image: postgres:16
    container_name: maxed-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maxed-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MAXED OPENFRAME RUNTIME
  # ============================================

  maxed-gateway:
    <<: *maxed-runtime-base
    container_name: maxed-gateway
    command: npm run start:gateway
    ports:
      - "127.0.0.1:4100:4100"
    depends_on:
      postgres:
        condition: service_healthy
      maxed-auth:
        condition: service_started
      maxed-api:
        condition: service_started
      maxed-external-api:
        condition: service_started
      maxed-stream:
        condition: service_started
      maxed-config:
        condition: service_started

  maxed-auth:
    <<: *maxed-runtime-base
    container_name: maxed-auth
    command: npm run start:auth
    ports:
      - "127.0.0.1:4101:4101"

  maxed-api:
    <<: *maxed-runtime-base
    container_name: maxed-api
    command: npm run start:api
    ports:
      - "127.0.0.1:4102:4102"

  maxed-external-api:
    <<: *maxed-runtime-base
    container_name: maxed-external-api
    command: npm run start:external-api
    ports:
      - "127.0.0.1:4103:4103"

  maxed-stream:
    <<: *maxed-runtime-base
    container_name: maxed-stream
    command: npm run start:stream
    ports:
      - "127.0.0.1:4104:4104"

  maxed-config:
    <<: *maxed-runtime-base
    container_name: maxed-config
    command: npm run start:config
    ports:
      - "127.0.0.1:4105:4105"

  # ============================================
  # 1. BIGCAPITAL (Bookkeeping)
  # ============================================

  bigcapital-mysql:
    image: mysql:8.0
    container_name: maxed-bigcapital-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${BIGCAPITAL_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BIGCAPITAL_MYSQL_DATABASE}
      MYSQL_USER: ${BIGCAPITAL_MYSQL_USER}
      MYSQL_PASSWORD: ${BIGCAPITAL_MYSQL_PASSWORD}
    volumes:
      - bigcapital_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bigcapital requires Redis on localhost (hardcoded), so it gets its own
  bigcapital-redis:
    image: redis:7-alpine
    container_name: maxed-bigcapital-redis
    restart: unless-stopped
    network_mode: "service:bigcapital-server"

  bigcapital-server:
    image: bigcapitalhq/server:latest
    container_name: maxed-bigcapital-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: bigcapital-mysql
      DB_USER: ${BIGCAPITAL_MYSQL_USER}
      DB_PASSWORD: ${BIGCAPITAL_MYSQL_PASSWORD}
      DB_NAME: ${BIGCAPITAL_MYSQL_DATABASE}
      DB_PORT: 3306
      DB_CHARSET: utf8
      BASE_URL: https://books.maxed.life
      JWT_SECRET: ${TWENTY_ACCESS_TOKEN_SECRET}
      MAIL_HOST: localhost
      MAIL_PORT: 25
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_SECURE: "false"
      SIGNUP_DISABLED: "false"
      SYSTEM_USER_FULLNAME: "Maxed Admin"
      SYSTEM_USER_EMAIL: ${INVOICENINJA_ADMIN_EMAIL:-admin@maxed.life}
      SYSTEM_USER_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      S3_BUCKET: local
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: none
      S3_SECRET_ACCESS_KEY: none
      STORAGE_DRIVER: local
    depends_on:
      bigcapital-mysql:
        condition: service_healthy

  bigcapital-webapp:
    image: bigcapitalhq/webapp:latest
    container_name: maxed-bigcapital-webapp
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      API_URL: /api
    depends_on:
      - bigcapital-server

  # ============================================
  # 2. PAPERLESS-NGX (Document Management)
  # ============================================

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: maxed-paperless
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBPORT: 5432
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: ${POSTGRES_USER}
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_URL: https://docs.maxed.life
      PAPERLESS_AUTO_LOGIN_USERNAME: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: "true"
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
      - paperless_export:/usr/src/paperless/export
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # 3. N8N (Workflow Automation)
  # ============================================

  n8n:
    image: n8nio/n8n:latest
    container_name: maxed-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      WEBHOOK_URL: https://flow.maxed.life
      N8N_HOST: flow.maxed.life
      N8N_PROTOCOL: https
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # 4. METABASE (BI/Reporting)
  # ============================================

  metabase:
    image: metabase/metabase:latest
    container_name: maxed-metabase
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_URL: https://reports.maxed.life
      MB_EMBEDDING_APP_ORIGIN: https://app.maxed.life
      MB_ENABLE_EMBEDDING: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # 5. DOCUSEAL (E-Signatures)
  # ============================================

  docuseal:
    image: docuseal/docuseal:latest
    container_name: maxed-docuseal
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      HOST: sign.maxed.life
      FORCE_SSL: "false"
      SECRET_KEY_BASE: ${DOCUSEAL_SECRET_KEY_BASE}
    volumes:
      - docuseal_data:/data

  # ============================================
  # 6. INVOICE NINJA v5 (Invoicing)
  # ============================================

  invoiceninja-mysql:
    image: mysql:8.0
    container_name: maxed-invoiceninja-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${INVOICENINJA_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${INVOICENINJA_MYSQL_DATABASE}
      MYSQL_USER: ${INVOICENINJA_MYSQL_USER}
      MYSQL_PASSWORD: ${INVOICENINJA_MYSQL_PASSWORD}
    volumes:
      - invoiceninja_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  invoiceninja:
    image: invoiceninja/invoiceninja:5
    container_name: maxed-invoiceninja
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_URL: https://billing.maxed.life
      APP_KEY: ${INVOICENINJA_APP_KEY}
      APP_ENV: production
      APP_DEBUG: "true"
      DB_HOST: invoiceninja-mysql
      DB_PORT: 3306
      DB_DATABASE: ${INVOICENINJA_MYSQL_DATABASE}
      DB_USERNAME: ${INVOICENINJA_MYSQL_USER}
      DB_PASSWORD: ${INVOICENINJA_MYSQL_PASSWORD}
      IN_USER_EMAIL: ${INVOICENINJA_ADMIN_EMAIL:-admin@maxed.life}
      IN_PASSWORD: ${INVOICENINJA_ADMIN_PASSWORD}
      REQUIRE_HTTPS: "false"
      TRUSTED_PROXIES: "*"
      IS_DOCKER: "true"
    volumes:
      - invoiceninja_public:/var/www/app/public
      - invoiceninja_storage:/var/www/app/storage
    depends_on:
      invoiceninja-mysql:
        condition: service_healthy

  # Invoice Ninja v5 is PHP-FPM only — needs nginx to serve HTTP
  invoiceninja-nginx:
    image: nginx:alpine
    container_name: maxed-invoiceninja-nginx
    restart: unless-stopped
    network_mode: "service:invoiceninja"
    volumes:
      - invoiceninja_public:/var/www/app/public:ro
      - ./invoiceninja/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ============================================
  # 7. TWENTY CRM
  # ============================================

  twenty:
    image: twentycrm/twenty:latest
    container_name: maxed-twenty
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      PG_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/twenty
      APP_SECRET: ${TWENTY_ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_SECRET: ${TWENTY_ACCESS_TOKEN_SECRET}
      LOGIN_TOKEN_SECRET: ${TWENTY_LOGIN_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${TWENTY_REFRESH_TOKEN_SECRET}
      FRONT_BASE_URL: https://crm.maxed.life
      SERVER_URL: https://crm.maxed.life
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: .local-storage
      REDIS_URL: redis://redis:6379
      CACHE_STORAGE_TYPE: redis
      ENABLE_DB_MIGRATIONS: "true"
      IS_SIGN_UP_DISABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # 8. KIMAI (Time Tracking)
  # ============================================

  kimai-mysql:
    image: mysql:8.0
    container_name: maxed-kimai-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${KIMAI_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${KIMAI_MYSQL_DATABASE}
      MYSQL_USER: ${KIMAI_MYSQL_USER}
      MYSQL_PASSWORD: ${KIMAI_MYSQL_PASSWORD}
    volumes:
      - kimai_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  kimai:
    image: kimai/kimai2:apache
    container_name: maxed-kimai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      ADMINMAIL: ${KIMAI_ADMIN_EMAIL}
      ADMINPASS: ${KIMAI_ADMIN_PASSWORD}
      DATABASE_URL: mysql://${KIMAI_MYSQL_USER}:${KIMAI_MYSQL_PASSWORD}@kimai-mysql:3306/${KIMAI_MYSQL_DATABASE}
      TRUSTED_PROXIES: "0.0.0.0/0"
    depends_on:
      kimai-mysql:
        condition: service_healthy

  # ============================================
  # 9. MATTERMOST (Team Chat)
  # ============================================

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: maxed-mattermost
    restart: unless-stopped
    ports:
      - "8065:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: ${MM_SQLSETTINGS_DATASOURCE}
      MM_SERVICESETTINGS_SITEURL: https://chat.maxed.life
      MM_TEAMSETTINGS_ENABLEUSERCREATION: "true"
      MM_SERVICESETTINGS_ENABLEOPENSERVER: "true"
      MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL: "true"
    volumes:
      - mattermost_config:/mattermost/config
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # NGINX (Reverse Proxy)
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: maxed-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL: mount these after running setup-ssl.sh on the server
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  maxed_storage:
  bigcapital_mysql_data:
  paperless_data:
  paperless_media:
  paperless_consume:
  paperless_export:
  n8n_data:
  docuseal_data:
  invoiceninja_mysql_data:
  invoiceninja_public:
  invoiceninja_storage:
  kimai_mysql_data:
  mattermost_config:
  mattermost_data:
  mattermost_logs:
  mattermost_plugins:
