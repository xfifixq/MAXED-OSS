            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================
    # Maxed API (api.maxed.life → port 4000)
    # ============================================
    server {
        listen 80;
        server_name api.maxed.life;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Allow CORS from dashboard
            add_header Access-Control-Allow-Origin "https://app.maxed.life" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }

    # ============================================
    # Bigcapital (books.maxed.life → port 3001)
    # ============================================
    server {
        listen 80;
        server_name books.maxed.life;
        location /.well-known/acme-challenge/ {
