worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Allow iframes from the dashboard domain
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ============================================
    # SSL Configuration (production)
    # Uncomment after running setup-ssl.sh
    # ============================================
    # ssl_certificate     /etc/letsencrypt/live/maxed.life/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/maxed.life/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # ============================================
    # Maxed Dashboard (app.maxed.life → port 3005)
    # ============================================
    server {
        listen 80;
        server_name app.maxed.life;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            proxy_pass http://127.0.0.1:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ============================================
    # Client Portal (portal.maxed.life → port 3006)
    # ============================================
    server {
